---
layout: default
---
<article class="teardown-single">
  <a href="/teardowns/" class="post-back">&larr; Teardowns</a>

  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%b %-d, %Y" }}</p>
  </header>

  {% if page.video %}
  <div class="teardown-video-wrap">
    {% assign embed_url = page.video | replace: 'watch?v=', 'embed/' | replace: 'youtu.be/', 'youtube.com/embed/' %}
    <iframe src="{{ embed_url }}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
  </div>
  {% endif %}

  <div class="post-body teardown-commentary">
    {{ content }}
  </div>
</article>
