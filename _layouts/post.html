---
layout: default
---
<article class="post">

  <a href="/writing.html" class="post-back">&larr; Writing</a>

  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%b %-d, %Y" }}{% if page.read_time %} &middot; {{ page.read_time }} min read{% endif %}</p>
  </header>

  <div class="post-body">
    {{ content }}
  </div>

</article>
